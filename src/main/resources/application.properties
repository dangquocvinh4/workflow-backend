spring.application.name=workflow-backend

# Database Configuration (NeonDB)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/neondb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
app.jwt.secret=${JWT_SECRET:SPA_BOOKING_SUPER_SECRET_KEY_123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Security/CORS
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
